name: Build Standalone Executables

on:
  push:
    branches: [ "main", "master", "migration" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: cli_chat_linux
            asset_name: cli_chat_linux
          - os: windows-latest
            artifact_name: cli_chat_windows.exe
            asset_name: cli_chat_windows.exe
          - os: macos-latest
            artifact_name: cli_chat_macos
            asset_name: cli_chat_macos

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller cryptography textual python-socketio[client] aiohttp requests

    - name: Build with PyInstaller
      run: |
        cd client
        pyinstaller --onefile --name ${{ matrix.asset_name }} --collect-all textual cli_client.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ matrix.os }}
        path: client/dist/${{ matrix.artifact_name }}
